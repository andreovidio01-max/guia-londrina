<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guia de Londrina</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --ink: #1c2530;
    --muted: #6b7785;
    --line: #e6e9ee;
    --accent: #0f4c3a;
    --accent-soft: #e7f0ec;
    --shadow: 0 1px 2px rgba(16,24,32,.04), 0 8px 24px -12px rgba(16,24,32,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 72px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 48px 24px 28px;
    text-align: center;
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: .28em;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(30px, 5vw, 46px);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .lead {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    margin-top: 12px;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Navegação por categorias */
  .nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(244,245,247,.88);
    backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 14px 0;
  }
  .nav-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .tab {
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--muted);
    padding: 9px 16px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s ease;
    white-space: nowrap;
  }
  .tab:hover { color: var(--ink); border-color: #c9d0d8; }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }

  main { max-width: 1120px; margin: 0 auto; padding: 8px 24px 0; }

  .section { padding-top: 40px; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .section-head h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .section-head .num {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 10px;
    border-radius: 999px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
    gap: 14px;
  }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 2px 4px rgba(16,24,32,.05), 0 16px 32px -16px rgba(15,76,58,.45);
  }
  .card .name { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .card .open {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .card:hover .open { color: var(--accent); }
  .card .arrow {
    flex: none;
    color: #b4bcc6;
    transition: color .15s ease, transform .15s ease;
  }
  .card:hover .arrow { color: var(--accent); transform: translate(2px, -2px); }

  footer {
    max-width: 1120px;
    margin: 64px auto 0;
    padding: 28px 24px 0;
    border-top: 1px solid var(--line);
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 400;
  }
</style>
</head>
<body>

  </header>

  <nav class="nav"><div class="nav-inner" id="nav"></div></nav>

  <main id="main"></main>

  <footer id="footer"></footer>

];

const nav = document.getElementById("nav");
const main = document.getElementById("main");
const total = DATA.reduce((s, c) => s + c.places.length, 0);

const slug = (s) => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z0-9]+/g, "-");

const arrowSVG = `<svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>`;

// Tabs
const allTab = document.createElement("button");
allTab.className = "tab active";
allTab.textContent = "Todos";
allTab.onclick = () => setFilter("todos", allTab);
nav.appendChild(allTab);

DATA.forEach(c => {
  const tab = document.createElement("button");
  tab.className = "tab";
  tab.textContent = c.cat;
  tab.onclick = () => setFilter(slug(c.cat), tab);
  nav.appendChild(tab);
});

// Sections
DATA.forEach(c => {
  const sec = document.createElement("section");
  sec.className = "section";
  sec.id = "sec-" + slug(c.cat);
  const head = document.createElement("div");
  head.className = "section-head";
  head.innerHTML = `<h2>${c.cat}</h2><span class="num">${c.places.length}</span>`;
  const grid = document.createElement("div");
  grid.className = "grid";
  c.places.forEach(p => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = p.u;
    a.target = "_blank";
    a.rel = "noopener";
    a.innerHTML = `<div><div class="name">${p.n}</div><div class="open">Abrir no Maps</div></div>${arrowSVG}`;
    grid.appendChild(a);
  });
  sec.appendChild(head);
  sec.appendChild(grid);
  main.appendChild(sec);
});

function setFilter(key, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = (key === "todos" || sec.id === "sec-" + key) ? "" : "none";
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("footer").textContent =
  total + " lugares em Londrina e região · Toque para abrir no Google Maps";
</script>

</html>
